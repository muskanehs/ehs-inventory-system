# Production reverse proxy for Economic Hardware Store inventory UI + API.
# Serve the SPA and API on the SAME host (ehsinventory.in) so auth cookies are
# first-party (SameSite=Lax). Point TLS termination at this server (or an upstream LB).
#
# Web build: leave VITE_API_URL unset or set VITE_API_URL=/api (never https://api.…).
# Backend CORS_ORIGIN=https://ehsinventory.in,https://www.ehsinventory.in

server {
  listen 80;
  server_name ehsinventory.in www.ehsinventory.in;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # Enable HSTS only when this nginx terminates HTTPS (or behind TLS-terminating proxy with HTTPS clients)
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Same-origin API — browser calls https://ehsinventory.in/api/...
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;
    proxy_http_version 1.1;
  }

  location /socket.io/ {
    proxy_pass http://backend:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://web:80/;
  }
}
